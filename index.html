<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 粒子重构星球交互系统 (移动端优化版)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #webcam {
            display: none;
        }
        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.75);
            padding: 12px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 165, 0, 0.2);
            pointer-events: none;
        }
        #ui-overlay h3 {
            color: #ffaa00;
            margin-bottom: 5px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        #ui-overlay p {
            font-size: 11px;
            line-height: 1.5;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            border-top: 1px solid #444;
            padding-top: 5px;
        }
        .status-val {
            color: #00ffcc;
            font-weight: bold;
        }
        #loading {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,165,0,0.2);
            border-top: 4px solid #ffaa00;
            border-radius: 50%;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script src="https://lib.baomitu.com/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">正在初始化 3D 引擎与 AI 模型...<br><span style="font-size:12px; color:#aaa;">(首次加载需要约 5-10 秒)</span></div>
    </div>

    <div id="ui-overlay">
        <h3>粒子形态转换系统</h3>
        <p>手势 1 ➔ <span>显示「你好」</span></p>
        <p>手势 2 ➔ <span>显示「同学」</span></p>
        <p>张开/握拳 ➔ <span>星球回归 (支持推拉拉远近)</span></p>
        <div class="status-item">
            <span>当前系统状态:</span>
            <span id="gesture-str" class="status-val">初始化中...</span>
        </div>
    </div>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline muted></video>

    <script>
        let scene, camera, renderer, allParticles; 
        // 手机端将数量调低到 10000 确保流畅度，视觉效果依然管够
        let totalCount = 10000; 
        
        let origPositions = []; let origColors = [];    
        let text1Positions = []; text2Positions = [];
        let morphMode = 'default'; 
        
        let targetCamRadius = 45; let currentCamRadius = 45;
        const MIN_CAM_RADIUS = 20; const MAX_CAM_RADIUS = 90;
        let targetCamAngleX = 0; let targetCamAngleY = 0;
        let currentCamAngleX = 0; let currentCamAngleY = 0;
        let lastHandZ = null; let lastHandAngle = null;

        const gestureStrEl = document.getElementById('gesture-str');
        const loadingEl = document.getElementById('loading');
        const loadingTextEl = document.getElementById('loading-text');

        // 强行设置安全超时限制：5秒后如果还没加载完，强制关闭加载层让用户至少能看3D特效
        setTimeout(() => {
            if(loadingEl.style.display !== 'none'){
                hideLoading();
                gestureStrEl.innerText = "环境受限，已切换至纯3D预览模式";
            }
        }, 6000);

        function hideLoading() {
            loadingEl.style.opacity = 0;
            setTimeout(() => loadingEl.style.display = 'none', 500);
        }

        function sampleTextPositions(text, count) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; // 降低画布分辨率加快手机解析速度
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 28px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = [];
            for (let y = 0; y < canvas.height; y += 1) {
                for (let x = 0; x < canvas.width; x += 1) {
                    const idx = (y * canvas.width + x) * 4;
                    if (imgData.data[idx] > 140) { 
                        pixels.push({
                            x: (x - canvas.width / 2) * 0.3,
                            y: -(y - canvas.height / 2) * 0.3,
                            z: (Math.random() - 0.5) * 0.5
                        });
                    }
                }
            }
            const pts = [];
            for (let i = 0; i < count; i++) {
                if (pixels.length > 0) {
                    const targetPt = pixels[i % pixels.length];
                    pts.push(targetPt.x + (Math.random() - 0.5) * 0.1, targetPt.y + (Math.random() - 0.5) * 0.1, targetPt.z);
                } else {
                    pts.push(0, 0, 0);
                }
            }
            return new Float32Array(pts);
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.01);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false }); // 手机端关闭抗锯齿提升帧率
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // 限制像素比
            container.appendChild(renderer.domElement);

            text1Positions = sampleTextPositions("你好", totalCount);
            text2Positions = sampleTextPositions("同学", totalCount);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(totalCount * 3);
            const colors = new Float32Array(totalCount * 3);
            const planetCount = Math.floor(totalCount * 0.6);

            for (let i = 0; i < totalCount; i++) {
                if (i < planetCount) {
                    const r = 10 + (Math.random() - 0.5) * 0.5;
                    const theta = Math.acos(Math.random() * 2 - 1);
                    const phi = Math.random() * Math.PI * 2;
                    positions[i * 3] = r * Math.sin(theta) * Math.cos(phi);
                    positions[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
                    positions[i * 3 + 2] = r * Math.cos(theta);
                    colors[i * 3] = 1.0; colors[i * 3 + 1] = 0.3 + Math.random() * 0.4; colors[i * 3 + 2] = 0.0; 
                } else {
                    const r = 15 + Math.random() * 10;
                    const theta = Math.random() * Math.PI * 2;
                    positions[i * 3] = r * Math.cos(theta);
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 0.6;
                    positions[i * 3 + 2] = r * Math.sin(theta);
                    const brightness = 0.7 + Math.random() * 0.3;
                    colors[i * 3] = brightness; colors[i * 3 + 1] = brightness + 0.05; colors[i * 3 + 2] = brightness + 0.1;
                }
                origPositions.push(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
                origColors.push(colors[i * 3], colors[i * 3 + 1], colors[i * 3 + 2]);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.5,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });

            allParticles = new THREE.Points(geometry, material);
            scene.add(allParticles);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const posAttr = allParticles.geometry.attributes.position;
            const colorAttr = allParticles.geometry.attributes.color;
            const time = Date.now() * 0.001;

            if (morphMode === 'default') {
                allParticles.rotation.y += 0.004;
                currentCamAngleX += (targetCamAngleX - currentCamAngleX) * 0.08;
                currentCamAngleY += (targetCamAngleY - currentCamAngleY) * 0.08;
            } else {
                allParticles.rotation.y *= 0.85;
                allParticles.rotation.x *= 0.85;
                currentCamAngleX += (0 - currentCamAngleX) * 0.1;
                currentCamAngleY += (0 - currentCamAngleY) * 0.1;
            }

            for (let i = 0; i < totalCount; i++) {
                let currentX = posAttr.getX(i); let currentY = posAttr.getY(i); let currentZ = posAttr.getZ(i);
                let targetX, targetY, targetZ, targetR, targetG, targetB;

                if (morphMode === 'text1') {
                    targetX = text1Positions[i * 3]; targetY = text1Positions[i * 3 + 1]; targetZ = text1Positions[i * 3 + 2];
                    targetR = 0.0; targetG = 1.0; targetB = 0.8;
                } else if (morphMode === 'text2') {
                    targetX = text2Positions[i * 3]; targetY = text2Positions[i * 3 + 1]; targetZ = text2Positions[i * 3 + 2];
                    targetR = 1.0; targetG = 0.5; targetB = 0.0;
                } else {
                    const wave = Math.sin(time + i * 0.01) * 0.03;
                    targetX = origPositions[i * 3] + wave; targetY = origPositions[i * 3 + 1]; targetZ = origPositions[i * 3 + 2] + wave;
                    targetR = origColors[i * 3]; targetG = origColors[i * 3 + 1]; targetB = origColors[i * 3 + 2];
                }

                posAttr.setXYZ(i, currentX + (targetX - currentX) * 0.1, currentY + (targetY - currentY) * 0.1, currentZ + (targetZ - currentZ) * 0.1);
                colorAttr.setXYZ(i, colorAttr.getX(i) + (targetR - colorAttr.getX(i)) * 0.1, colorAttr.getY(i) + (targetG - colorAttr.getY(i)) * 0.1, colorAttr.getZ(i) + (targetB - colorAttr.getZ(i)) * 0.1);
            }

            posAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;

            currentCamRadius += (targetCamRadius - currentCamRadius) * 0.1;
            camera.position.x = currentCamRadius * Math.sin(currentCamAngleX) * Math.cos(currentCamAngleY);
            camera.position.y = currentCamRadius * Math.sin(currentCamAngleY);
            camera.position.z = currentCamRadius * Math.cos(currentCamAngleX) * Math.cos(currentCamAngleY);
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }

        function onResults(results) {
            hideLoading();
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                gestureStrEl.innerText = "未检测到手势 (默认星球形态)";
                morphMode = 'default'; lastHandZ = null; lastHandAngle = null;
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            const fingersUp = checkFingersUp(landmarks);
            const upCount = fingersUp.reduce((a, b) => a + b, 0);
            const wrist = landmarks[0]; const mcp9 = landmarks[9];
            const handSizeInFrame = Math.sqrt(Math.pow(wrist.x - mcp9.x, 2) + Math.pow(wrist.y - mcp9.y, 2));
            const handAngle = Math.atan2(mcp9.y - wrist.y, mcp9.x - wrist.x);

            if (upCount === 1 && fingersUp[1] === 1) {
                morphMode = 'text1'; gestureStrEl.innerText = "手势 1 ➔ 聚焦文本「你好」"; lastHandZ = null; 
            } else if (upCount === 2 && fingersUp[1] === 1 && fingersUp[2] === 1) {
                morphMode = 'text2'; gestureStrEl.innerText = "手势 2 ➔ 聚焦文本「同学」"; lastHandZ = null;
            } else {
                morphMode = 'default';
                if (upCount === 0) {
                    gestureStrEl.innerText = "握拳 ➔ 星球回归并拉远";
                    if (lastHandZ !== null) {
                        if ((handSizeInFrame - lastHandZ) < 0) targetCamRadius = Math.min(MAX_CAM_RADIUS, targetCamRadius + 2);
                    }
                    lastHandZ = handSizeInFrame;
                } else if (upCount === 5) {
                    gestureStrEl.innerText = "张开 ➔ 星球回归并靠近";
                    if (lastHandZ !== null) {
                        if ((handSizeInFrame - lastHandZ) > 0) targetCamRadius = Math.max(MIN_CAM_RADIUS, targetCamRadius - 2);
                    }
                    lastHandZ = handSizeInFrame;
                } else {
                    gestureStrEl.innerText = "未触发预设手势"; lastHandZ = null;
                }
            }

            if (morphMode === 'default' && lastHandAngle !== null) {
                let angleDelta = handAngle - lastHandAngle;
                if (angleDelta > Math.PI) angleDelta -= Math.PI * 2;
                if (angleDelta < -Math.PI) angleDelta += Math.PI * 2;
                targetCamAngleX -= angleDelta * 1.5; 
            }
            lastHandAngle = handAngle;
        }

        function checkFingersUp(landmarks) {
            const res = [0, 0, 0, 0, 0];
            if (landmarks[8].y < landmarks[6].y) res[1] = 1;  
            if (landmarks[12].y < landmarks[10].y) res[2] = 1; 
            if (landmarks[16].y < landmarks[14].y) res[3] = 1; 
            if (landmarks[20].y < landmarks[18].y) res[4] = 1; 
            if (Math.abs(landmarks[4].x - landmarks[5].x) > 0.04) res[0] = 1;              
            return res;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function initMediaPipe() {
            const videoElement = document.getElementById('webcam');
            // 判断当前是否处于安全上下文
            if (!window.isSecureContext) {
                loadingTextEl.innerHTML = "<span style='color:#ff5555;'>⚠️ 运行失败：必须使用 HTTPS 协议访问！</span><br><br>手机端由于隐私限制，禁止在非安全的 http 协议下唤起相机。请配置域名SSL证书，或者使用内网穿透（如 cpolar/ngrok 的 https 映射链接）再用手机打开。";
                return;
            }

            const hands = new Hands({
                locateFile: (file) => `https://unpkg.com/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0, // 移动端降级到 0 极大提升识别响应速度
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            hands.onResults(onResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 320, height: 240 // 降低摄像头输入流分辨率，减少手机CPU计算负担
            });
            
            cameraUtils.start().catch(err => {
                loadingTextEl.innerHTML = "⚠️ 摄像头启动失败<br><br>1. 请确保已授予网页摄像头使用权限。<br>2. 微信内置浏览器可能会拦截此操作，请尝试复制链接在<b>手机系统自带浏览器（如 Safari、Chrome）</b>中打开。";
            });
        }

        window.onload = () => {
            initThree();
            initMediaPipe();
        };
    </script>
</body>
</html>
