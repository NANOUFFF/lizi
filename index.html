<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 粒子重构星球交互系统 (文字静止版)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #webcam {
            display: none;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.75);
            padding: 15px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 165, 0, 0.2);
            pointer-events: none;
        }
        #ui-overlay h3 {
            color: #ffaa00;
            margin-bottom: 8px;
            font-size: 16px;
            letter-spacing: 1px;
        }
        #ui-overlay p {
            font-size: 13px;
            line-height: 1.6;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 5px;
        }
        .status-val {
            color: #00ffcc;
            font-weight: bold;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 100;
            font-size: 18px;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,165,0,0.2);
            border-top: 4px solid #ffaa00;
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">正在加载 AI 模型与解析文字粒子坐标...</div>
    </div>

    <div id="ui-overlay">
        <h3>粒子形态转换系统</h3>
        <p>手势 1 </span></p>
        <p>手势 2 </span></p>
        <p>其他/张开/握拳 ➔ <span>回归星球形態，恢复手势旋转</span></p>
        <!-- <div class="status-item">
            <span>当前系统状态:</span>
            <span id="gesture-str" class="status-val">初始化中...</span>
        </div> -->
    </div>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script>
        // ==========================================
        // 1. 全局变量与配置
        // ==========================================
        let scene, camera, renderer;
        let allParticles; 
        let totalCount = 18000; 
        
        let origPositions = []; 
        let origColors = [];    
        let text1Positions = [];
        let text2Positions = [];
        
        let morphMode = 'default'; 
        
        // 相机交互参数
        let targetCamRadius = 45; let currentCamRadius = 45;
        const MIN_CAM_RADIUS = 20; const MAX_CAM_RADIUS = 90;
        
        // 初始让视角正对前方
        let targetCamAngleX = 0; let targetCamAngleY = 0;
        let currentCamAngleX = 0; let currentCamAngleY = 0;
        let lastHandZ = null; let lastHandAngle = null;

        const gestureStrEl = document.getElementById('gesture-str');
        const loadingEl = document.getElementById('loading');

        // ==========================================
        // 2. 预计算：从 Canvas 像素中提取 3D 文字粒子坐标
        // ==========================================
        function sampleTextPositions(text, count) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 55px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = [];
            
            for (let y = 0; y < canvas.height; y += 2) {
                for (let x = 0; x < canvas.width; x += 2) {
                    const idx = (y * canvas.width + x) * 4;
                    if (imgData.data[idx] > 128) { 
                        const posX = (x - canvas.width / 2) * 0.15;
                        const posY = -(y - canvas.height / 2) * 0.15;
                        const posZ = (Math.random() - 0.5) * 0.5; // 文字厚度稍微收敛，让结构更扁平清晰
                        pixels.push({x: posX, y: posY, z: posZ});
                    }
                }
            }
            
            const pts = [];
            for (let i = 0; i < count; i++) {
                if (pixels.length > 0) {
                    const targetPt = pixels[i % pixels.length];
                    pts.push(
                        targetPt.x + (Math.random() - 0.5) * 0.1,
                        targetPt.y + (Math.random() - 0.5) * 0.1,
                        targetPt.z
                    );
                } else {
                    pts.push(0, 0, 0);
                }
            }
            return new Float32Array(pts);
        }

        // ==========================================
        // 3. 初始化 Three.js 场景与粒子
        // ==========================================
        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.01);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            text1Positions = sampleTextPositions("你好", totalCount);
            text2Positions = sampleTextPositions("同学", totalCount);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(totalCount * 3);
            const colors = new Float32Array(totalCount * 3);

            const planetCount = 11000;
            const planetRadius = 10;

            for (let i = 0; i < totalCount; i++) {
                if (i < planetCount) {
                    const r = planetRadius + (Math.random() - 0.5) * 0.5;
                    const theta = Math.acos(Math.random() * 2 - 1);
                    const phi = Math.random() * Math.PI * 2;

                    positions[i * 3] = r * Math.sin(theta) * Math.cos(phi);
                    positions[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
                    positions[i * 3 + 2] = r * Math.cos(theta);

                    colors[i * 3] = 1.0; 
                    colors[i * 3 + 1] = 0.3 + Math.random() * 0.4; 
                    colors[i * 3 + 2] = 0.0; 
                } else {
                    const isOuter = Math.random() > 0.5;
                    const innerR = isOuter ? 18 : 15;
                    const outerR = isOuter ? 30 : 22;
                    
                    const r = innerR + Math.random() * (outerR - innerR);
                    const theta = Math.random() * Math.PI * 2;

                    positions[i * 3] = r * Math.cos(theta);
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 0.6;
                    positions[i * 3 + 2] = r * Math.sin(theta);

                    const brightness = 0.7 + Math.random() * 0.3;
                    colors[i * 3] = brightness;
                    colors[i * 3 + 1] = brightness + 0.05;
                    colors[i * 3 + 2] = brightness + 0.1;
                }

                origPositions.push(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
                origColors.push(colors[i * 3], colors[i * 3 + 1], colors[i * 3 + 2]);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const texture = createParticleTexture();
            const material = new THREE.PointsMaterial({
                size: 0.6,
                map: texture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });

            allParticles = new THREE.Points(geometry, material);
            scene.add(allParticles);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,230,180,1)');
            gradient.addColorStop(0.5, 'rgba(255,100,0,0.4)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        // ==========================================
        // 4. 动画主循环 (旋转重构逻辑)
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            const posAttr = allParticles.geometry.attributes.position;
            const colorAttr = allParticles.geometry.attributes.color;
            const time = Date.now() * 0.001;

            if (morphMode === 'default') {
                // 星球模式：允许基础自转自旋
                allParticles.rotation.y += 0.002;
                
                // 相机跟随手势进行轨道旋转计算
                currentCamAngleX += (targetCamAngleX - currentCamAngleX) * 0.08;
                currentCamAngleY += (targetCamAngleY - currentCamAngleY) * 0.08;
            } else {
                // 文字模式：强制让粒子容器和相机的旋转角度重置归零！确保文字永远正对屏幕、不产生偏斜
                allParticles.rotation.y *= 0.85;
                allParticles.rotation.x *= 0.85;

                currentCamAngleX += (0 - currentCamAngleX) * 0.1;
                currentCamAngleY += (0 - currentCamAngleY) * 0.1;
            }

            // 粒子插值矩阵计算
            for (let i = 0; i < totalCount; i++) {
                let currentX = posAttr.getX(i);
                let currentY = posAttr.getY(i);
                let currentZ = posAttr.getZ(i);

                let targetX, targetY, targetZ;
                let targetR, targetG, targetB;

                if (morphMode === 'text1') {
                    targetX = text1Positions[i * 3];
                    targetY = text1Positions[i * 3 + 1];
                    targetZ = text1Positions[i * 3 + 2];
                    targetR = 0.0; targetG = 1.0; targetB = 0.8; // 青蓝色
                } else if (morphMode === 'text2') {
                    targetX = text2Positions[i * 3];
                    targetY = text2Positions[i * 3 + 1];
                    targetZ = text2Positions[i * 3 + 2];
                    targetR = 1.0; targetG = 0.5; targetB = 0.0; // 金橙色
                } else {
                    const wave = Math.sin(time + i) * 0.05;
                    targetX = origPositions[i * 3] + wave;
                    targetY = origPositions[i * 3 + 1];
                    targetZ = origPositions[i * 3 + 2] + wave;
                    
                    targetR = origColors[i * 3];
                    targetG = origColors[i * 3 + 1];
                    targetB = origColors[i * 3 + 2];
                }

                posAttr.setXYZ(
                    i,
                    currentX + (targetX - currentX) * 0.08,
                    currentY + (targetY - currentY) * 0.08,
                    currentZ + (targetZ - currentZ) * 0.08
                );

                colorAttr.setXYZ(
                    i,
                    colorAttr.getX(i) + (targetR - colorAttr.getX(i)) * 0.08,
                    colorAttr.getY(i) + (targetG - colorAttr.getY(i)) * 0.08,
                    colorAttr.getZ(i) + (targetB - colorAttr.getZ(i)) * 0.08
                );
            }

            posAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;

            // 相机距离缩放（无论什么模式都支持推拉，防止穿模）
            const radiusDiff = targetCamRadius - currentCamRadius;
            currentCamRadius += radiusDiff * 0.1;

            // 重新计算相机空间坐标
            camera.position.x = currentCamRadius * Math.sin(currentCamAngleX) * Math.cos(currentCamAngleY);
            camera.position.y = currentCamRadius * Math.sin(currentCamAngleY);
            camera.position.z = currentCamRadius * Math.cos(currentCamAngleX) * Math.cos(currentCamAngleY);

            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }

        // ==========================================
        // 5. MediaPipe 手势识别控制核心
        // ==========================================
        function onResults(results) {
            if (loadingEl.style.display !== 'none') {
                loadingEl.style.opacity = 0;
                setTimeout(() => loadingEl.style.display = 'none', 500);
            }

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                gestureStrEl.innerText = "未检测到手势 (默认星球形态)";
                morphMode = 'default';
                lastHandZ = null; lastHandAngle = null;
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            const fingersUp = checkFingersUp(landmarks);
            const upCount = fingersUp.reduce((a, b) => a + b, 0);
            
            const wrist = landmarks[0];
            const mcp9 = landmarks[9];
            const handSizeInFrame = Math.sqrt(Math.pow(wrist.x - mcp9.x, 2) + Math.pow(wrist.y - mcp9.y, 2));
            const handAngle = Math.atan2(mcp9.y - wrist.y, mcp9.x - wrist.x);

            if (upCount === 1 && fingersUp[1] === 1) {
                morphMode = 'text1';
                gestureStrEl.innerText = "手势 1 ➔ 聚焦文本「你好」";
                lastHandZ = null; 
            } else if (upCount === 2 && fingersUp[1] === 1 && fingersUp[2] === 1) {
                morphMode = 'text2';
                gestureStrEl.innerText = "手势 2 ➔ 聚焦文本「同学」";
                lastHandZ = null;
            } else {
                morphMode = 'default';

                if (upCount === 0) {
                    gestureStrEl.innerText = "握拳 ➔ 星球回归并拉远相机";
                    if (lastHandZ !== null) {
                        const deltaZ = handSizeInFrame - lastHandZ;
                        if (deltaZ < 0) {
                            targetCamRadius += Math.abs(deltaZ) * 160;
                            if (targetCamRadius > MAX_CAM_RADIUS) targetCamRadius = MAX_CAM_RADIUS;
                        }
                    }
                    lastHandZ = handSizeInFrame;
                } else if (upCount === 5) {
                    gestureStrEl.innerText = "五指张开 ➔ 星球回归并靠近相机";
                    if (lastHandZ !== null) {
                        const deltaZ = handSizeInFrame - lastHandZ;
                        if (deltaZ > 0) {
                            targetCamRadius -= Math.abs(deltaZ) * 220;
                            if (targetCamRadius < MIN_CAM_RADIUS) targetCamRadius = MIN_CAM_RADIUS;
                        }
                    }
                    lastHandZ = handSizeInFrame;
                } else {
                    gestureStrEl.innerText = "普通状态 ➔ 默认星球形态";
                    lastHandZ = null;
                }
            }

            // 手势旋转交互：只有在默认星球状态下才改变 targetCamAngleX
            if (morphMode === 'default' && lastHandAngle !== null) {
                let angleDelta = handAngle - lastHandAngle;
                if (angleDelta > Math.PI) angleDelta -= Math.PI * 2;
                if (angleDelta < -Math.PI) angleDelta += Math.PI * 2;
                targetCamAngleX -= angleDelta * 2.2; 
            }
            lastHandAngle = handAngle;
        }

        function checkFingersUp(landmarks) {
            const res = [0, 0, 0, 0, 0];
            if (landmarks[8].y < landmarks[6].y) res[1] = 1;  
            if (landmarks[12].y < landmarks[10].y) res[2] = 1; 
            if (landmarks[16].y < landmarks[14].y) res[3] = 1; 
            if (landmarks[20].y < landmarks[18].y) res[4] = 1; 
            const thumbDistance = Math.abs(landmarks[4].x - landmarks[5].x);
            if (thumbDistance > 0.04) res[0] = 1;              
            return res;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function initMediaPipe() {
            const videoElement = document.getElementById('webcam');
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });
            hands.onResults(onResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 640, height: 480
            });
            cameraUtils.start().catch(err => {
                document.getElementById('loading-text').innerText = "未能启动摄像头，请确保权限已开启并使用本地环境运行。";
            });
        }

        window.onload = () => {
            initThree();
            initMediaPipe();
        };
    </script>
</body>
</html>
